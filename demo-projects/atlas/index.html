<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atlas Ops Status</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="container">
        <h1>Atlas Ops Status</h1>
        <p>Live uptime, incident response, and deployment readiness.</p>
      </div>
    </header>

    <section class="container status-grid">
      <div class="card">
        <h2>Core API</h2>
        <span class="pill ok">Operational</span>
      </div>
      <div class="card">
        <h2>Data Sync</h2>
        <span class="pill warn">Degraded</span>
      </div>
      <div class="card">
        <h2>Alerts</h2>
        <span class="pill ok">Operational</span>
      </div>
    </section>
  </body>
</html>
