<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay Guided Onboarding</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">Relay</p>
        <h1>Guided onboarding that teams finish.</h1>
        <p class="lead">Make onboarding feel effortless with clear next steps and live status.</p>
        <div class="steps">
          <div>
            <h2>Step 1</h2>
            <p>Collect product access + billing details in one flow.</p>
          </div>
          <div>
            <h2>Step 2</h2>
            <p>Configure integrations with real-time validation.</p>
          </div>
          <div>
            <h2>Step 3</h2>
            <p>Launch with milestone tracking and alerts.</p>
          </div>
        </div>
        <button>Start onboarding</button>
      </section>
    </main>
  </body>
</html>
