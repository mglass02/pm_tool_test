<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invisible Project Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-10">
      <header class="mb-8">
        <h1 class="text-3xl font-semibold tracking-tight">Invisible Project Management</h1>
        <p class="text-slate-400 mt-2">Issues move automatically based on GitHub activity.</p>
      </header>

      <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
        <div class="flex gap-2">
          <button id="projectViewBtn" class="px-4 py-2 rounded-lg bg-slate-800 text-slate-100">Project View</button>
          <button id="portfolioViewBtn" class="px-4 py-2 rounded-lg bg-slate-900 text-slate-400">Portfolio View</button>
        </div>
        <div class="flex items-center gap-3 text-sm text-slate-400">
          <label for="projectSelect">Project</label>
          <select id="projectSelect" class="bg-slate-900 border border-slate-800 rounded-md px-2 py-1 text-slate-100"></select>
        </div>
      </div>

      <main id="projectView" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-4">
          <h2 class="text-lg font-semibold mb-3">To Do</h2>
          <ul id="todo" class="space-y-3"></ul>
        </section>
        <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-4">
          <h2 class="text-lg font-semibold mb-3">In Progress</h2>
          <ul id="inProgress" class="space-y-3"></ul>
        </section>
        <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-4">
          <h2 class="text-lg font-semibold mb-3">Done</h2>
          <ul id="done" class="space-y-3"></ul>
        </section>
      </main>

      <section id="portfolioView" class="hidden space-y-4">
        <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-4">
          <h2 class="text-lg font-semibold mb-3">Portfolio Insights</h2>
          <div id="portfolioStats" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
        <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-4">
          <h2 class="text-lg font-semibold mb-3">Projects</h2>
          <div id="portfolioProjects" class="space-y-3"></div>
        </div>
      </section>
    </div>

    <template id="card">
      <li class="bg-slate-800/70 border border-slate-700 rounded-lg p-3">
        <div class="text-sm text-slate-400" data-id></div>
        <a class="text-base font-medium hover:underline" target="_blank" rel="noreferrer" data-title></a>
        <div class="text-sm text-slate-400 mt-1" data-assignee></div>
        <div class="text-xs text-slate-500 mt-2" data-time></div>
      </li>
    </template>

    <script>
      const socket = io();
      const columns = {
        todo: document.getElementById('todo'),
        inProgress: document.getElementById('inProgress'),
        done: document.getElementById('done'),
      };
      const projectSelect = document.getElementById('projectSelect');
      const projectView = document.getElementById('projectView');
      const portfolioView = document.getElementById('portfolioView');
      const projectViewBtn = document.getElementById('projectViewBtn');
      const portfolioViewBtn = document.getElementById('portfolioViewBtn');
      const portfolioStats = document.getElementById('portfolioStats');
      const portfolioProjects = document.getElementById('portfolioProjects');

      let currentView = 'project';
      let currentProjectId = null;

      function formatDuration(start, end) {
        if (!start) return '—';
        const startMs = new Date(start).getTime();
        const endMs = end ? new Date(end).getTime() : Date.now();
        const diff = Math.max(0, endMs - startMs);
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        if (days > 0) return `${days}d ${hours % 24}h`;
        if (hours > 0) return `${hours}h ${minutes % 60}m`;
        return `${minutes}m`;
      }

      function setView(view) {
        currentView = view;
        if (view === 'project') {
          projectView.classList.remove('hidden');
          portfolioView.classList.add('hidden');
          projectViewBtn.classList.replace('bg-slate-900', 'bg-slate-800');
          projectViewBtn.classList.replace('text-slate-400', 'text-slate-100');
          portfolioViewBtn.classList.replace('bg-slate-800', 'bg-slate-900');
          portfolioViewBtn.classList.replace('text-slate-100', 'text-slate-400');
        } else {
          projectView.classList.add('hidden');
          portfolioView.classList.remove('hidden');
          portfolioViewBtn.classList.replace('bg-slate-900', 'bg-slate-800');
          portfolioViewBtn.classList.replace('text-slate-400', 'text-slate-100');
          projectViewBtn.classList.replace('bg-slate-800', 'bg-slate-900');
          projectViewBtn.classList.replace('text-slate-100', 'text-slate-400');
        }
      }

      projectViewBtn.addEventListener('click', () => setView('project'));
      portfolioViewBtn.addEventListener('click', () => setView('portfolio'));
      projectSelect.addEventListener('change', (e) => {
        currentProjectId = e.target.value || null;
      });

      function renderColumn(el, items) {
        el.innerHTML = '';
        const tpl = document.getElementById('card');
        items.forEach((item) => {
          const node = tpl.content.cloneNode(true);
          node.querySelector('[data-id]').textContent = `#${item.number}`;
          const title = node.querySelector('[data-title]');
          title.textContent = item.title;
          if (item.url) title.href = item.url;
          node.querySelector('[data-assignee]').textContent = item.assignee
            ? `Assignee: ${item.assignee}`
            : 'Assignee: —';
          const timeLabel = item.status === 'done' ? 'Time spent' : 'Time so far';
          node.querySelector('[data-time]').textContent = `${timeLabel}: ${formatDuration(item.startedAt, item.mergedAt)}`;
          el.appendChild(node);
        });
      }

      function renderProjectOptions(projects, activeId) {
        const entries = Object.values(projects);
        projectSelect.innerHTML = '';
        entries.forEach((project) => {
          const option = document.createElement('option');
          option.value = project.id;
          option.textContent = `${project.name} (${project.repo})`;
          if (project.id === activeId) option.selected = true;
          projectSelect.appendChild(option);
        });
      }

      socket.on('state', (state) => {
        const projects = state.projects || {};
        const projectIds = Object.keys(projects);
        if (projectIds.length === 0) return;
        if (!currentProjectId || !projects[currentProjectId]) {
          currentProjectId = projectIds[0];
        }
        renderProjectOptions(projects, currentProjectId);
        const project = projects[currentProjectId];
        const issues = project.issues || {};
        const order = project.order || { todo: [], inProgress: [], done: [] };

        const mapOrder = (list) => list.map((num) => issues[num]).filter(Boolean);
        renderColumn(columns.todo, mapOrder(order.todo));
        renderColumn(columns.inProgress, mapOrder(order.inProgress));
        renderColumn(columns.done, mapOrder(order.done));

        const allIssues = Object.values(issues);
        const doneIssues = allIssues.filter((i) => i.status === 'done' && i.startedAt && i.mergedAt);
        const avgCycleMs =
          doneIssues.reduce((sum, item) => sum + (new Date(item.mergedAt) - new Date(item.startedAt)), 0) /
          (doneIssues.length || 1);
        const avgCycleHours = Math.round(avgCycleMs / 3600000);

        portfolioStats.innerHTML = '';
        const totalOpen = Object.values(projects).reduce(
          (sum, p) => sum + Object.values(p.issues || {}).filter((i) => i.status !== 'done').length,
          0
        );
        const stats = [
          { label: 'Projects', value: projectIds.length },
          { label: 'Open Issues', value: totalOpen },
          { label: 'Avg Cycle Time (hrs)', value: avgCycleHours },
        ];
        stats.forEach((stat) => {
          const card = document.createElement('div');
          card.className = 'bg-slate-950/60 border border-slate-800 rounded-lg p-4';
          card.innerHTML = `<div class=\"text-slate-400 text-sm\">${stat.label}</div><div class=\"text-xl font-semibold mt-1\">${stat.value}</div>`;
          portfolioStats.appendChild(card);
        });

        portfolioProjects.innerHTML = '';
        projectIds.forEach((id) => {
          const p = projects[id];
          const issueList = Object.values(p.issues || {});
          const counts = {
            todo: issueList.filter((i) => i.status === 'todo').length,
            inProgress: issueList.filter((i) => i.status === 'inProgress').length,
            done: issueList.filter((i) => i.status === 'done').length,
          };
          const row = document.createElement('div');
          row.className = 'flex flex-wrap items-center justify-between gap-3 border border-slate-800 rounded-lg p-3 bg-slate-950/40';
          row.innerHTML = `<div class=\"font-medium\">${p.name} <span class=\"text-slate-500 text-sm\">(${p.repo})</span></div>
            <div class=\"text-sm text-slate-400\">To Do: ${counts.todo} • In Progress: ${counts.inProgress} • Done: ${counts.done}</div>`;
          portfolioProjects.appendChild(row);
        });
      });
    </script>
  </body>
</html>
